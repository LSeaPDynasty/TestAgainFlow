<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TestFlow 执行引擎 - WebSocket实时版</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        .connection-status {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 10px 15px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 500;
            z-index: 1000;
            transition: all 0.3s ease;
        }

        .connection-status.connected {
            background: #10b981;
            color: white;
        }

        .connection-status.disconnected {
            background: #ef4444;
            color: white;
        }

        .connection-status.connecting {
            background: #fbbf24;
            color: white;
        }

        .live-indicator {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #10b981;
            animation: pulse 2s infinite;
            margin-right: 5px;
        }

        @keyframes pulse {
            0%, 100% {
                opacity: 1;
                transform: scale(1);
            }
            50% {
                opacity: 0.5;
                transform: scale(1.2);
            }
        }

        .realtime-badge {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }
    </style>
</head>
<body>
    <!-- 连接状态指示器 -->
    <div id="connectionStatus" class="connection-status connecting">
        <span class="live-indicator"></span>
        <span id="connectionText">连接中...</span>
    </div>

    <div class="container">
        <!-- 头部 -->
        <header class="header">
            <div class="logo">
                <h1>🤖 TestFlow 执行引擎</h1>
                <span class="version">v1.0.0</span>
                <div class="realtime-badge">
                    <span class="live-indicator"></span>
                    实时连接
                </div>
            </div>
            <div class="status-controls">
                <button id="startBtn" class="btn btn-success">▶️ 启动引擎</button>
                <button id="stopBtn" class="btn btn-danger">⏹️ 停止引擎</button>
            </div>
        </header>

        <!-- 状态卡片 -->
        <div class="status-cards">
            <div class="card">
                <div class="card-icon">📊</div>
                <div class="card-content">
                    <div class="card-label">引擎状态</div>
                    <div class="card-value" id="engineStatus">检查中...</div>
                </div>
            </div>
            <div class="card">
                <div class="card-icon">⚡</div>
                <div class="card-content">
                    <div class="card-label">活动任务</div>
                    <div class="card-value" id="activeTasks">0</div>
                </div>
            </div>
            <div class="card">
                <div class="card-icon">📋</div>
                <div class="card-content">
                    <div class="card-label">队列大小</div>
                    <div class="card-value" id="queueSize">0</div>
                </div>
            </div>
            <div class="card">
                <div class="card-icon">📱</div>
                <div class="card-content">
                    <div class="card-label">连接设备</div>
                    <div class="card-value" id="deviceCount">0</div>
                </div>
            </div>
        </div>

        <!-- 主要内容区域 -->
        <div class="main-content">
            <!-- 任务列表 -->
            <div class="panel">
                <div class="panel-header">
                    <h2>📝 活动任务</h2>
                    <div class="realtime-badge">
                        <span class="live-indicator"></span>
                        实时更新
                    </div>
                </div>
                <div class="panel-body">
                    <div id="tasksList" class="tasks-list">
                        <div class="empty-state">等待数据...</div>
                    </div>
                </div>
            </div>

            <!-- 设备列表 -->
            <div class="panel">
                <div class="panel-header">
                    <h2>📱 连接的设备</h2>
                    <div class="realtime-badge">
                        <span class="live-indicator"></span>
                        实时更新
                    </div>
                </div>
                <div class="panel-body">
                    <div id="devicesList" class="devices-list">
                        <div class="empty-state">等待数据...</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 日志面板 -->
        <div class="panel log-panel">
            <div class="panel-header">
                <h2>📋 实时日志</h2>
                <div class="log-controls">
                    <div class="realtime-badge">
                        <span class="live-indicator"></span>
                        实时推送
                    </div>
                    <button id="clearLogs" class="btn btn-small">🗑️ 清空</button>
                </div>
            </div>
            <div class="panel-body">
                <div id="logsContainer" class="logs-container"></div>
            </div>
        </div>
    </div>

    <script src="/static/js/app_ws.js"></script>
</body>
</html>
